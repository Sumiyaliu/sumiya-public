<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>枸杞 & 石斛 重复度分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f7fa;
    padding: 24px;
    color: #1f2937;
  }
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 24px;
    color: #111827;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 14px;
    color: #6b7280;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
    max-width: 1280px;
    margin-left: auto;
    margin-right: auto;
  }
  .summary-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    text-align: center;
  }
  .summary-card .label {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 8px;
  }
  .summary-card .value {
    font-size: 28px;
    font-weight: 700;
    color: #ef6c00;
    margin-bottom: 4px;
  }
  .summary-card .desc {
    font-size: 12px;
    color: #9ca3af;
  }
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .chart-box {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .chart-title {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chart-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: #ef6c00;
    border-radius: 2px;
  }
  .chart {
    width: 100%;
    height: 520px;
  }
  .data-source {
    text-align: center;
    color: #9ca3af;
    font-size: 12px;
    margin-top: 24px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>枸杞 × 石斛 用户重复度分析</h1>
  <p>曝光 · 点击 · 下单 三个环节的人群重合情况</p>
</div>

<div class="summary">
  <div class="summary-card">
    <div class="label">曝光 UV 重合度</div>
    <div class="value">3.20%</div>
    <div class="desc">重合 225,880 人 / 较小集合 5,997,017</div>
  </div>
  <div class="summary-card">
    <div class="label">点击 UV 重合度</div>
    <div class="value">0.41%</div>
    <div class="desc">重合 1,390 人 / 较小集合 291,231</div>
  </div>
  <div class="summary-card">
    <div class="label">下单 UV 重合度</div>
    <div class="value">0.17%</div>
    <div class="desc">重合 38 人 / 较小集合 20,823</div>
  </div>
</div>

<div class="charts-grid">
  <div class="chart-box">
    <div class="chart-title">曝光 UV 重复度</div>
    <div id="chart-exposure" class="chart"></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">点击 UV 重复度</div>
    <div id="chart-click" class="chart"></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">下单 UV 重复度</div>
    <div id="chart-order" class="chart"></div>
  </div>
</div>

<div class="data-source">数据来源：广告投放数据 · 重合度 = 重合人数 / 较小品类UV</div>

<script>
  const baseOption = {
    tooltip: {
      trigger: 'item',
      formatter: function(params) {
        return params.marker + params.name + '<br/>' +
               'UV: ' + params.value.toLocaleString() + '<br/>' +
               '占比: ' + params.percent + '%';
      }
    },
    legend: {
      data: ['曝光UV', '点击UV', '下单UV', '浅层转化量UV'],
      top: 10,
      textStyle: { color: '#374151' }
    },
    grid: [
      { left: '5%',  right: '52%', top: '15%',  bottom: '15%' },
      { left: '52%', right: '5%',  top: '15%',  bottom: '15%' }
    ],
    xAxis: [
      { gridIndex: 0, type: 'value', show: false, min: 0, max: 100 },
      { gridIndex: 1, type: 'value', show: false, min: 0, max: 100 }
    ],
    yAxis: [
      { gridIndex: 0, type: 'value', show: false, min: 0, max: 100 },
      { gridIndex: 1, type: 'value', show: false, min: 0, max: 100 }
    ],
    series: [
      {
        name: '曝光UV',
        type: 'scatter',
        symbolSize: function(val) { return Math.sqrt(val[2]) * 0.55; },
        data: [[50, 50, 5997017]],
        itemStyle: { color: '#1e88e5', opacity: 0.85, borderColor: '#1565c0', borderWidth: 2 },
        label: {
          show: true,
          position: 'bottom',
          formatter: function(p) {
            return '枸杞类滋补品\n' + p.data[2].toLocaleString();
          },
          fontSize: 12,
          fontWeight: 600,
          color: '#1f2937'
        }
      },
      {
        name: '曝光UV',
        type: 'scatter',
        xAxisIndex: 1, yAxisIndex: 1,
        symbolSize: function(val) { return Math.sqrt(val[2]) * 0.55; },
        data: [[50, 50, 1020597]],
        itemStyle: { color: '#fb8c00', opacity: 0.85, borderColor: '#ef6c00', borderWidth: 2 },
        label: {
          show: true,
          position: 'bottom',
          formatter: function(p) {
            return '石斛/枫斗滋补品\n' + p.data[2].toLocaleString();
          },
          fontSize: 11,
          fontWeight: 600,
          color: '#1f2937'
        }
      }
    ]
  };

  function renderChart(domId, gouqi, shihu, overlap, overlapPct, typeLabel) {
    const chart = echarts.init(document.getElementById(domId));

    // 计算气泡半径（按数值比例）
    const maxVal = Math.max(gouqi, shihu);
    const gouqiSize = Math.sqrt(gouqi / maxVal) * 180;
    const shihuSize = Math.sqrt(shihu / maxVal) * 180;
    const overlapSize = Math.sqrt(overlap / maxVal) * 180;

    // 重合度位置：两圆相交区域
    const overlapX = 58;
    const overlapY = 50;

    const option = {
      tooltip: {
        trigger: 'item',
        formatter: function(p) {
          if (p.seriesName === '重合') {
            return '<b>重合人群</b><br/>' +
                   'UV: ' + p.value.uv.toLocaleString() + '<br/>' +
                   '重合度: ' + p.value.pct;
          }
          return p.seriesName + '<br/>UV: ' + p.value.uv.toLocaleString();
        }
      },
      legend: {
        data: [typeLabel, '浅层转化量UV'],
        top: 10,
        textStyle: { color: '#374151' }
      },
      grid: { left: '5%', right: '5%', top: '18%', bottom: '12%', containLabel: false },
      xAxis: {
        type: 'value', min: 0, max: 100,
        show: true,
        splitLine: { show: false },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { show: false }
      },
      yAxis: {
        type: 'value', min: 0, max: 100,
        show: true,
        splitLine: { show: false },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { show: false }
      },
      series: [
        // 枸杞气泡
        {
          name: typeLabel,
          type: 'scatter',
          data: [{ value: [42, 50], uv: gouqi }],
          symbolSize: gouqiSize,
          itemStyle: { color: '#1e88e5', opacity: 0.75, borderColor: '#1565c0', borderWidth: 2 },
          label: {
            show: true,
            position: 'bottom',
            distance: 10,
            formatter: function() {
              return '枸杞类滋补品\n' + gouqi.toLocaleString();
            },
            fontSize: 12,
            fontWeight: 600,
            color: '#1f2937'
          }
        },
        // 石斛气泡
        {
          name: typeLabel,
          type: 'scatter',
          data: [{ value: [70, 50], uv: shihu }],
          symbolSize: shihuSize,
          itemStyle: { color: '#fb8c00', opacity: 0.75, borderColor: '#ef6c00', borderWidth: 2 },
          label: {
            show: true,
            position: 'bottom',
            distance: 10,
            formatter: function() {
              return '石斛/枫斗滋补品\n' + shihu.toLocaleString();
            },
            fontSize: 11,
            fontWeight: 600,
            color: '#1f2937'
          }
        },
        // 重合部分
        {
          name: '重合',
          type: 'scatter',
          data: [{ value: [overlapX, overlapY], uv: overlap, pct: overlapPct }],
          symbolSize: overlapSize,
          itemStyle: { color: '#9ca3af', opacity: 0.5 },
          label: {
            show: true,
            position: 'bottom',
            distance: 12,
            formatter: function(p) {
              return '枸杞类滋补品 ∩ 石斛/枫斗滋补品\n' +
                     overlap.toLocaleString() + '\n' +
                     '重合度: ' + overlapPct;
            },
            fontSize: 11,
            fontWeight: 600,
            color: '#1f2937'
          }
        }
      ]
    };

    chart.setOption(option);
    window.addEventListener('resize', () => chart.resize());
  }

  renderChart('chart-exposure', 5997017, 1020597, 225880, '3.20%', '曝光UV');
  renderChart('chart-click',    291231,  51230,   1390,   '0.41%', '点击UV');
  renderChart('chart-order',    20823,   1094,    38,     '0.17%', '下单UV');
</script>

</body>
</html>
