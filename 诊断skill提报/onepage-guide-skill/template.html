<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- 替换为你的标题，如：腾讯广告投放动态周知（2026年X月第X周） --></title>
<style>
  /* ===== 基础重置 ===== */
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f0f4f8;color:#1a202c;line-height:1.6}

  /* ===== 页面容器（截图目标） ===== */
  .snapshot{max-width:1200px;margin:0 auto;padding:32px 36px 28px;background:#fff}

  /* ===== 页头 ===== */
  .snap-hd{text-align:center;margin-bottom:22px}
  .snap-hd h1{font-size:24px;font-weight:800;color:#1e3a5f;letter-spacing:1px}
  .snap-hd .sub{font-size:12px;color:#8896a8;margin-top:3px}
  .snap-hd .line{width:60px;height:3px;background:linear-gradient(90deg,#2563eb,#60a5fa);margin:8px auto 0;border-radius:2px}

  /* ===== 模块（圆角卡片） ===== */
  .mod{border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;margin-bottom:14px}
  .mod-h{padding:10px 18px;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;letter-spacing:.5px}
  .mod-b{padding:16px 18px;background:#fff}

  /* ===== 两列等高布局 ===== */
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
  .row2 .mod{display:flex;flex-direction:column}
  .row2 .mod-b{flex:1}

  /* ===== 标签系统 ===== */
  /* 📢 变化/规则标签（红色系） */
  .lb{font-size:10.5px;font-weight:700;letter-spacing:.8px;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:5px}
  .lb-change{background:#fef2f2;color:#dc2626}
  /* ✅ 行动建议标签（蓝色系） */
  .lb-action{background:#eff6ff;color:#2563eb}

  /* ===== 内容块 ===== */
  .blk{margin-bottom:10px}.blk:last-child{margin-bottom:0}
  .blk p{font-size:12.5px;color:#475569;margin:0;line-height:1.55}
  .blk p+p{margin-top:3px}
  .blk strong{color:#1e293b}

  /* ===== 行动条（带优先级色块） ===== */
  .ar{display:flex;align-items:flex-start;gap:6px;font-size:12.5px;color:#334155;line-height:1.5;margin-top:3px}
  .ar .d{flex-shrink:0;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .d-b{background:#dbeafe;color:#1d4ed8}       /* P1 蓝色 */
  .d-r{background:#fee2e2;color:#dc2626}       /* 警示红色 */
  .d-p0{background:#dc2626;color:#fff}         /* P0 红底白字 */
  .red{color:#dc2626}

  /* ===== 虚线分隔 ===== */
  hr.sep{border:none;border-top:1px dashed #e2e8f0;margin:10px 0}

  /* ===== KPI 卡片 ===== */
  .kpi-row{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap}
  .km{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:5px 10px;text-align:center;flex:1;min-width:70px}
  .km .v{font-size:15px;font-weight:800;color:#2563eb}
  .km .l{font-size:10px;color:#8896a8;margin-top:1px}

  /* ===== 扶持卡片（金色边框） ===== */
  .bonus{margin-top:10px;border:1.5px solid #f59e0b;border-radius:8px;overflow:hidden;background:#fffdf5}
  .bonus-h{background:linear-gradient(135deg,#fbbf24,#f59e0b);padding:6px 14px;font-size:12px;font-weight:700;color:#78350f;display:flex;align-items:center;gap:5px}
  .bonus-b{padding:10px 14px;font-size:12.5px;color:#78350f;line-height:1.5}
  .bonus-b strong{color:#92400e}

  /* ===== 商家 Todo（浅红底 + 红色左竖线） ===== */
  .todo{margin-top:8px;padding:8px 14px;background:#fef2f2;border:1px solid #fecaca;border-left:3px solid #dc2626;border-radius:6px;font-size:12px;color:#991b1b;line-height:1.5}
  .todo strong{color:#7f1d1d}
  .todo-label{font-size:10px;font-weight:800;letter-spacing:1px;color:#dc2626;text-transform:uppercase;margin-bottom:2px}

  /* ===== 链接按钮 ===== */
  .link-row{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
  .lk{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:4px;font-size:11px;text-decoration:none;font-weight:600;transition:.2s}
  .lk-b{background:#2563eb;color:#fff}.lk-b:hover{background:#1d4ed8}
  .lk-o{background:#fff;color:#2563eb;border:1px solid #2563eb}.lk-o:hover{background:#eff6ff}

  /* ===== 公式/概念定义块 ===== */
  .formula{margin:8px 0;padding:8px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#334155;text-align:center;line-height:1.8}
  .formula strong{color:#1e293b}

  /* ===== 页脚 ===== */
  .snap-ft{text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8}
</style>
</head>
<body>

<div class="snapshot">

  <!-- ==================== 页头 ==================== -->
  <div class="snap-hd">
    <h1><!-- 替换为主标题，如：腾讯广告 · 投放动态周知 --></h1>
    <div class="sub"><!-- 替换为副标题，如：2026年4月第4周 · 食品饮料行业 --></div>
    <div class="line"></div>
  </div>

  <!-- ==================== 模块一：全宽模块示例 ==================== -->
  <!-- 适用于需要突出展示的核心信息，如重大规则变更 -->
  <div class="mod">
    <div class="mod-h" style="background:linear-gradient(135deg,#dc2626,#ef4444)">
      <!-- 替换：模块图标 + 模块标题，如：⚡ 规则升级 · 平台生态优化 -->
      ⚡ 模块标题
    </div>
    <div class="mod-b" style="display:flex;gap:24px;flex-wrap:wrap">
      <!-- 左侧：认知层 -->
      <div style="flex:1.2;min-width:280px">
        <div class="blk">
          <div class="lb lb-change">📢 核心变化</div>
          <p><!-- 替换为核心变化描述 --></p>
          <p><!-- 可添加多条，用 ❶ ❷ ❸ 编号 --></p>
        </div>
      </div>
      <!-- 右侧：行动层 -->
      <div style="flex:0.8;min-width:240px">
        <div class="blk">
          <div class="lb lb-action">✅ 行动建议</div>
          <div class="ar"><span class="d d-r">!</span><strong><!-- 重要提醒 --></strong></div>
          <div class="ar"><span class="d d-b">→</span><!-- 行动建议1 --></div>
          <div class="ar"><span class="d d-b">→</span><!-- 行动建议2 --></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== 两列等高模块 ==================== -->
  <!-- 适用于并列展示两个同级模块 -->
  <div class="row2">

    <!-- ===== 左列模块 ===== -->
    <div class="mod">
      <div class="mod-h" style="background:linear-gradient(135deg,#2563eb,#3b82f6)">
        <!-- 替换：🎨 模块标题 -->
        🎨 左列模块标题
      </div>
      <div class="mod-b">
        <!-- 认知层 -->
        <div class="blk">
          <div class="lb lb-change">📢 核心指标</div>
          <p><!-- 替换为说明文字 --></p>
          <!-- 公式/概念定义块（可选） -->
          <div class="formula">
            <strong><!-- 概念名 --></strong> = <!-- 公式或一句话定义 -->
          </div>
        </div>

        <hr class="sep">

        <!-- 行动层 -->
        <div class="blk">
          <div class="lb lb-action">✅ 行动建议</div>
          <div class="ar"><span class="d d-p0">P0</span><strong class="red"><!-- P0行动项 --></strong></div>
          <div class="ar"><span class="d d-b">P1</span><strong><!-- P1行动项 --></strong></div>
        </div>

        <hr class="sep">

        <!-- 扶持卡片（可选，按需添加） -->
        <div class="bonus">
          <div class="bonus-h">🎁 限时扶持 · <!-- 扶持名称 --> · <!-- 时间范围 --></div>
          <div class="bonus-b">
            <!-- 扶持内容描述 -->
          </div>
        </div>

        <!-- 商家 Todo（可选，按需添加） -->
        <div class="todo">
          <div class="todo-label">📌 商家 Todo</div>
          <!-- 操作链路：A → B → C -->
        </div>

        <!-- 参考链接（可选） -->
        <div class="link-row">
          <a href="#" class="lk lk-b" target="_blank">📘 参考文档</a>
          <a href="#" class="lk lk-o" target="_blank">📄 操作指南</a>
        </div>
      </div>
    </div>

    <!-- ===== 右列模块 ===== -->
    <div class="mod">
      <div class="mod-h" style="background:linear-gradient(135deg,#16a34a,#22c55e)">
        <!-- 替换：🚀 模块标题 -->
        🚀 右列模块标题
      </div>
      <div class="mod-b">
        <div class="blk">
          <div class="lb lb-change">📢 背景说明</div>
          <p><!-- 替换为说明文字 --></p>
        </div>

        <hr class="sep">

        <!-- 能力/功能介绍（可复制多个） -->
        <div class="blk">
          <div class="lb lb-action">能力一 · <!-- 能力名称 --></div>
          <p><!-- 能力说明 --></p>
          <!-- KPI 卡片（可选） -->
          <div class="kpi-row">
            <div class="km"><div class="v"><!-- 数值 --></div><div class="l"><!-- 指标名 --></div></div>
            <div class="km"><div class="v"><!-- 数值 --></div><div class="l"><!-- 指标名 --></div></div>
          </div>
        </div>

        <div class="todo">
          <div class="todo-label">📌 商家 Todo</div>
          <!-- 操作链路 -->
        </div>

        <hr class="sep">

        <div class="blk">
          <div class="lb lb-action">能力二 · <!-- 能力名称 --></div>
          <p><!-- 能力说明 --></p>
          <div class="kpi-row">
            <div class="km"><div class="v"><!-- 数值 --></div><div class="l"><!-- 指标名 --></div></div>
            <div class="km"><div class="v"><!-- 数值 --></div><div class="l"><!-- 指标名 --></div></div>
          </div>
        </div>

        <!-- 扶持卡片 -->
        <div class="bonus">
          <div class="bonus-h">🎁 限时扶持 · <!-- 扶持名称 --> · <!-- 时间范围 --></div>
          <div class="bonus-b"><!-- 扶持内容 --></div>
        </div>
        <div class="todo">
          <div class="todo-label">📌 商家 Todo</div>
          <!-- 操作链路 -->
        </div>

        <div class="link-row">
          <a href="#" class="lk lk-o" target="_blank">📄 参考文档</a>
        </div>
      </div>
    </div>

  </div><!-- /.row2 -->

  <!-- ==================== 页脚 ==================== -->
  <div class="snap-ft">
    <!-- 替换：团队名 · 日期 · 备注 -->
    腾讯广告 · 行业运营 · 2026.XX.XX · 详细方案请联系对接运营
  </div>

</div><!-- /.snapshot -->

<!-- 编辑态 + 截图导出工具（同目录引用） -->
<script src="editable-snapshot.js"></script>

</body>
</html>
